<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деванагари - тренажёр</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .selection-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 350px;
            overflow-y: auto;
        }
        .selection-area h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 16px;
        }
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 4px;
        }
        .letter-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .letter-item:hover {
            background: #e9ecef;
        }
        .letter-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .letter-item .dev {
            font-size: 20px;
            font-weight: bold;
            width: 30px;
            text-align: center;
        }
        .letter-item .sound {
            color: #6c757d;
            font-size: 12px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 100px;
        }
        .btn-primary {
            background: #4a90d9;
            color: white;
        }
        .btn-primary:hover {
            background: #357abd;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        .btn-warning:hover {
            background: #e0a800;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .quiz-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .quiz-letter {
            font-size: 80px;
            font-weight: bold;
            color: #2c3e50;
            margin: 5px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .quiz-hint {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 10px;
            min-height: 25px;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin: 10px 0;
        }
        .quiz-options button {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .quiz-options button:hover:not(:disabled) {
            background: #e9ecef;
            border-color: #4a90d9;
        }
        .quiz-options button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .quiz-options button.correct {
            background: #d4edda;
            border-color: #28a745;
        }
        .quiz-options button.wrong {
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        .reveal-btn {
            grid-column: 1 / -1;
            padding: 18px;
            font-size: 20px;
            font-weight: 700;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .reveal-btn:hover {
            background: #138496;
            transform: scale(1.02);
        }
        .reveal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .quiz-result {
            font-size: 18px;
            font-weight: 600;
            margin: 10px 0;
            min-height: 30px;
        }
        .quiz-result.correct {
            color: #28a745;
        }
        .quiz-result.wrong {
            color: #dc3545;
        }
        
        @keyframes flashGreen {
            0% { background-color: #d4edda; transform: scale(1); }
            50% { background-color: #28a745; color: white; transform: scale(1.1); border-radius: 20px; padding: 0 20px; }
            100% { background-color: #d4edda; transform: scale(1); }
        }
        .flash-correct {
            animation: flashGreen 0.6s ease;
            border-radius: 20px;
            padding: 0 20px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            font-size: 14px;
            color: #6c757d;
        }
        .stats span {
            font-weight: 700;
            color: #2c3e50;
        }
        
        .progress-info {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }
        .progress-info span {
            font-weight: 700;
            color: #2c3e50;
        }
        
        @media (max-width: 500px) {
            .quiz-options {
                grid-template-columns: 1fr;
            }
            .letter-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            }
            .quiz-letter {
                font-size: 60px;
                min-height: 70px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Деванагари</h1>
    <p class="subtitle">Сначала вспомните сами, потом проверьте себя</p>
    
    <div class="selection-area" id="selectionArea">
        <h3>✅ Отметьте выученные буквы/слоги</h3>
        <div class="letter-grid" id="letterGrid"></div>
    </div>
    
    <div class="btn-group">
        <button class="btn btn-primary" id="saveBtn">💾 Сохранить и начать</button>
        <button class="btn btn-success" id="nextBtn">🔄 Следующий</button>
        <button class="btn btn-warning" id="resetBtn">🗑️ Сброс</button>
    </div>
    
    <div class="quiz-area" id="quizArea">
        <div class="quiz-letter" id="quizLetter">❓</div>
        <div class="quiz-hint" id="quizHint">Попробуйте вспомнить произношение</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-result" id="quizResult"></div>
        <div class="progress-info" id="progressInfo">Осталось: <span id="remainingCount">0</span> / <span id="totalInPool">0</span></div>
        <div class="stats">
            <div>✅ <span id="correctCount">0</span></div>
            <div>❌ <span id="wrongCount">0</span></div>
            <div>📊 <span id="totalCount">0</span></div>
        </div>
    </div>
</div>

<script>
// ----------------------------------------------------------------------
// БАЗА ДАННЫХ с РУССКИМ произношением
// ----------------------------------------------------------------------
const ALL_LETTERS = {
    // Гласные
    "अ": "а", "आ": "аа", "इ": "и", "ई": "ии",
    "उ": "у", "ऊ": "уу", "ऋ": "ри",
    "ए": "э", "ऐ": "аи",
    "ओ": "о", "औ": "ау",
    "अं": "ан", "अः": "аха",
    
    // Согласные
    "क": "ка", "ख": "кха", "ग": "га", "घ": "гха", "ङ": "нга",
    "च": "ча", "छ": "чха", "ज": "джа", "झ": "джха", "ञ": "нья",
    "ट": "та", "ठ": "тха", "ड": "да", "ढ": "дха", "ण": "на",
    "त": "та", "थ": "тха", "द": "да", "ध": "дха", "न": "на",
    "प": "па", "फ": "пха", "ब": "ба", "भ": "бха", "म": "ма",
    "य": "йа", "र": "ра", "ल": "ла", "व": "ва",
    "श": "ша", "ष": "ша", "स": "са", "ह": "ха",
    
    // Сложные
    "क्ष": "кша", "त्र": "тра", "ज्ञ": "гья"
};

// ----------------------------------------------------------------------
// СЛОГИ с РУССКИМ произношением (ПОЛНЫЙ НАБОР)
// ----------------------------------------------------------------------
const SYLLABLES = {
    // ===== К (ка) =====
    "का": "каа", "कि": "ки", "की": "кии", "कु": "ку", "कू": "куу",
    "के": "кэ", "कै": "каи", "को": "ко", "कौ": "кау",
    
    // ===== КХ (кха) - ДОБАВЛЕНЫ! =====
    "खा": "кхаа", "खि": "кхи", "खी": "кхии", "खु": "кху", "खू": "кхуу",
    "खे": "кхэ", "खै": "кхаи", "खो": "кхо", "खौ": "кхау",
    
    // ===== Г (га) =====
    "गा": "гаа", "गि": "ги", "गी": "гии", "गु": "гу", "गू": "гуу",
    "गे": "гэ", "गै": "гаи", "गो": "го", "गौ": "гау",
    
    // ===== ГХ (гха) - ДОБАВЛЕНЫ! =====
    "घा": "гхаа", "घि": "гхи", "घी": "гхии", "घु": "гху", "घू": "гхуу",
    "घे": "гхэ", "घै": "гхаи", "घो": "гхо", "घौ": "гхау",
    
    // ===== Т (та) =====
    "ता": "таа", "ति": "ти", "ती": "тии", "तु": "ту", "तू": "туу",
    "ते": "тэ", "तै": "таи", "तो": "то", "तौ": "тау",
    
    // ===== Н (на) =====
    "ना": "наа", "नि": "ни", "नी": "нии", "नु": "ну", "नू": "нуу",
    "ने": "нэ", "नै": "наи", "но": "но", "नौ": "нау",
    
    // ===== М (ма) =====
    "मा": "маа", "मि": "ми", "मी": "мии", "मु": "му", "मू": "муу",
    "मे": "мэ", "मै": "маи", "мо": "мо", "मौ": "мау",
    
    // ===== Р (ра) =====
    "रा": "раа", "रि": "ри", "री": "рии", "रु": "ру", "रू": "руу",
    "ре": "рэ", "रै": "раи", "ро": "ро", "रौ": "рау",
    
    // ===== Л (ла) =====
    "ला": "лаа", "लि": "ли", "ली": "лии", "लु": "лу", "लू": "луу",
    "ле": "лэ", "लै": "лаи", "ло": "ло", "लौ": "лау",
    
    // ===== Ч (ча) =====
    "चा": "чаа", "चि": "чи", "ची": "чии", "चु": "чу", "चू": "чуу",
    "चे": "чэ", "चै": "чаи", "чо": "чо", "चौ": "чау",
    
    // ===== ДЖ (джа) =====
    "जा": "джаа", "जि": "джи", "जी": "джии", "जु": "джу", "जू": "джуу",
    "जे": "джэ", "जै": "джаи", "जो": "джо", "जौ": "джау"
};

const ALL_ITEMS = { ...ALL_LETTERS, ...SYLLABLES };

const DEFAULT_SELECTED = [
    'अ', 'आ', 'इ', 'ई', 'उ', 'ऊ', 'ऐ', 'औ', 'ए', 'ओ', 'अं', 'अः',
    'क', 'ख', 'ग', 'घ'
];

// ----------------------------------------------------------------------
// СОСТОЯНИЕ
// ----------------------------------------------------------------------
let learned = [];
let questionPool = [];
let currentItem = null;
let correctAnswer = null;
let options = [];
let isAnswered = false;
let isRevealed = false;
let autoNextTimer = null;
let isWaitingForNext = false;

let stats = { correct: 0, wrong: 0, total: 0 };

// ----------------------------------------------------------------------
// ФУНКЦИЯ: автоматически добавлять слоги для выученных согласных
// ----------------------------------------------------------------------
function updateSyllablesForLearnedConsonants() {
    const consonants = learned.filter(item => item in ALL_LETTERS && item.length === 1 && item.match(/[क-ह]/));
    const allSyllables = Object.keys(SYLLABLES);
    const newSyllables = [];
    
    consonants.forEach(cons => {
        const matchingSyllables = allSyllables.filter(syl => syl.startsWith(cons));
        newSyllables.push(...matchingSyllables);
    });
    
    newSyllables.forEach(syl => {
        if (!learned.includes(syl)) {
            learned.push(syl);
        }
    });
}

// ----------------------------------------------------------------------
// ЗАГРУЗКА / СОХРАНЕНИЕ
// ----------------------------------------------------------------------
function loadProgress() {
    try {
        const data = localStorage.getItem('devanagari_learned');
        if (data) {
            const parsed = JSON.parse(data);
            learned = parsed.filter(item => item in ALL_ITEMS);
        }
        if (!learned || learned.length === 0) {
            learned = [...DEFAULT_SELECTED];
        }
    } catch(e) {
        learned = [...DEFAULT_SELECTED];
    }
    
    updateSyllablesForLearnedConsonants();
    
    try {
        const statsData = localStorage.getItem('devanagari_stats');
        if (statsData) stats = JSON.parse(statsData);
    } catch(e) {
        stats = { correct: 0, wrong: 0, total: 0 };
    }
}

function saveProgress() {
    localStorage.setItem('devanagari_learned', JSON.stringify(learned));
    localStorage.setItem('devanagari_stats', JSON.stringify(stats));
}

// ----------------------------------------------------------------------
// ОТОБРАЖЕНИЕ
// ----------------------------------------------------------------------
function renderLetterGrid() {
    const grid = document.getElementById('letterGrid');
    grid.innerHTML = '';
    
    const letters = Object.keys(ALL_LETTERS).sort((a, b) => {
        const aIsVowel = a.length <= 2 && !a.match(/[क-ह]/);
        const bIsVowel = b.length <= 2 && !b.match(/[क-ह]/);
        if (aIsVowel && !bIsVowel) return -1;
        if (!aIsVowel && bIsVowel) return 1;
        return a.localeCompare(b);
    });
    
    const syllables = Object.keys(SYLLABLES).sort();
    const allKeys = [...letters, ...syllables];
    
    allKeys.forEach(key => {
        const div = document.createElement('div');
        div.className = 'letter-item';
        
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = 'cb_' + key;
        cb.checked = learned.includes(key);
        cb.addEventListener('change', () => {
            if (cb.checked) {
                if (!learned.includes(key)) learned.push(key);
            } else {
                learned = learned.filter(item => item !== key);
            }
            saveProgress();
        });
        
        const label = document.createElement('label');
        label.htmlFor = 'cb_' + key;
        label.innerHTML = `<span class="dev">${key}</span><span class="sound">${ALL_ITEMS[key]}</span>`;
        
        div.appendChild(cb);
        div.appendChild(label);
        grid.appendChild(div);
    });
}

function updateStats() {
    document.getElementById('correctCount').textContent = stats.correct;
    document.getElementById('wrongCount').textContent = stats.wrong;
    document.getElementById('totalCount').textContent = stats.total;
}

function updateProgressInfo() {
    document.getElementById('remainingCount').textContent = questionPool.length;
    document.getElementById('totalInPool').textContent = learned.length;
}

function renderQuizContent(showOptions) {
    const container = document.getElementById('quizOptions');
    container.innerHTML = '';
    
    if (showOptions) {
        options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.textContent = opt;
            btn.dataset.index = index;
            btn.addEventListener('click', () => checkAnswer(index));
            container.appendChild(btn);
        });
    } else {
        const btn = document.createElement('button');
        btn.className = 'reveal-btn';
        btn.textContent = '👁️ Показать варианты';
        btn.id = 'revealBtn';
        btn.addEventListener('click', revealOptions);
        container.appendChild(btn);
    }
}

// ----------------------------------------------------------------------
// ГЕНЕРАЦИЯ ВОПРОСА
// ----------------------------------------------------------------------
function generateQuestion() {
    if (autoNextTimer) {
        clearTimeout(autoNextTimer);
        autoNextTimer = null;
    }
    
    isAnswered = false;
    isRevealed = false;
    isWaitingForNext = false;
    
    document.getElementById('quizResult').textContent = '';
    document.getElementById('quizResult').className = 'quiz-result';
    document.getElementById('quizHint').textContent = 'Попробуйте вспомнить произношение самостоятельно';
    
    const validLearned = learned.filter(item => item in ALL_ITEMS);
    if (validLearned.length === 0) {
        document.getElementById('quizLetter').textContent = '❌';
        document.getElementById('quizHint').textContent = 'Отметьте буквы выше!';
        renderQuizContent(false);
        const revealBtn = document.getElementById('revealBtn');
        if (revealBtn) revealBtn.disabled = true;
        updateProgressInfo();
        return;
    }
    
    // Если пул пуст - пересоздаём
    if (questionPool.length === 0) {
        questionPool = shuffleArray([...validLearned]);
        document.getElementById('quizHint').textContent = '🔄 Новый круг! Все символы будут показаны по одному разу';
    }
    
    currentItem = questionPool.pop();
    correctAnswer = ALL_ITEMS[currentItem];
    document.getElementById('quizLetter').textContent = currentItem;
    
    const learnedSounds = [...new Set(validLearned.map(item => ALL_ITEMS[item]))];
    let wrongOptions = learnedSounds.filter(s => s !== correctAnswer);
    wrongOptions = shuffleArray(wrongOptions);
    let selectedWrong = wrongOptions.slice(0, 3);
    
    while (selectedWrong.length < 3) {
        selectedWrong.push(correctAnswer + '?');
    }
    
    options = shuffleArray([correctAnswer, ...selectedWrong]);
    
    renderQuizContent(false);
    const revealBtn = document.getElementById('revealBtn');
    if (revealBtn) revealBtn.disabled = false;
    
    updateProgressInfo();
}

// ----------------------------------------------------------------------
// ПОКАЗАТЬ ВАРИАНТЫ
// ----------------------------------------------------------------------
function revealOptions() {
    if (isRevealed || isAnswered || isWaitingForNext) return;
    isRevealed = true;
    
    renderQuizContent(true);
    document.getElementById('quizHint').textContent = 'Выберите правильный вариант';
    
    document.querySelectorAll('#quizOptions button').forEach(btn => {
        btn.disabled = false;
    });
}

// ----------------------------------------------------------------------
// ПРОВЕРКА ОТВЕТА
// ----------------------------------------------------------------------
function checkAnswer(index) {
    if (isAnswered || isWaitingForNext) return;
    if (!isRevealed) {
        revealOptions();
        return;
    }
    
    isAnswered = true;
    isWaitingForNext = true;
    
    const buttons = document.querySelectorAll('#quizOptions button');
    const chosen = options[index];
    const isCorrect = chosen === correctAnswer;
    
    stats.total++;
    if (isCorrect) {
        stats.correct++;
        document.getElementById('quizResult').textContent = '✅ Правильно!';
        document.getElementById('quizResult').className = 'quiz-result correct';
        
        const letterEl = document.getElementById('quizLetter');
        letterEl.classList.add('flash-correct');
        setTimeout(() => letterEl.classList.remove('flash-correct'), 600);
        
        buttons.forEach(btn => btn.disabled = true);
        
        updateStats();
        saveProgress();
        updateProgressInfo();
        
        if (autoNextTimer) clearTimeout(autoNextTimer);
        autoNextTimer = setTimeout(() => {
            isWaitingForNext = false;
            generateQuestion();
        }, 1000);
        
    } else {
        stats.wrong++;
        document.getElementById('quizResult').textContent = `❌ Неверно. Правильно: ${correctAnswer}`;
        document.getElementById('quizResult').className = 'quiz-result wrong';
        
        updateStats();
        saveProgress();
        
        buttons.forEach((btn, i) => {
            btn.disabled = true;
            if (options[i] === correctAnswer) {
                btn.className = 'correct';
            } else if (i === index && !isCorrect) {
                btn.className = 'wrong';
            }
        });
        
        isWaitingForNext = false;
    }
}

// ----------------------------------------------------------------------
// ВСПОМОГАТЕЛЬНЫЕ
// ----------------------------------------------------------------------
function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ----------------------------------------------------------------------
// ИНИЦИАЛИЗАЦИЯ
// ----------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
    loadProgress();
    renderLetterGrid();
    updateStats();
    
    const validLearned = learned.filter(item => item in ALL_ITEMS);
    questionPool = shuffleArray([...validLearned]);
    updateProgressInfo();
    
    document.getElementById('saveBtn').addEventListener('click', () => {
        updateSyllablesForLearnedConsonants();
        saveProgress();
        renderLetterGrid();
        
        const valid = learned.filter(item => item in ALL_ITEMS);
        questionPool = shuffleArray([...valid]);
        updateProgressInfo();
        generateQuestion();
    });
    
    document.getElementById('nextBtn').addEventListener('click', () => {
        if (autoNextTimer) {
            clearTimeout(autoNextTimer);
            autoNextTimer = null;
        }
        isWaitingForNext = false;
        generateQuestion();
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('Удалить весь прогресс и статистику?')) {
            localStorage.removeItem('devanagari_learned');
            localStorage.removeItem('devanagari_stats');
            learned = [...DEFAULT_SELECTED];
            updateSyllablesForLearnedConsonants();
            stats = { correct: 0, wrong: 0, total: 0 };
            
            const valid = learned.filter(item => item in ALL_ITEMS);
            questionPool = shuffleArray([...valid]);
            
            renderLetterGrid();
            updateStats();
            updateProgressInfo();
            saveProgress();
            generateQuestion();
        }
    });
    
    if (learned.length > 0) {
        generateQuestion();
    } else {
        document.getElementById('quizLetter').textContent = '📖';
        document.getElementById('quizHint').textContent = 'Отметьте буквы и нажмите "Сохранить"';
        renderQuizContent(false);
        const revealBtn = document.getElementById('revealBtn');
        if (revealBtn) revealBtn.disabled = true;
        updateProgressInfo();
    }
});
</script>
</body>
</html>
