function speakText(soundText, callback) {
    // soundText — это произношение (например, "ka", "kha")

        if (value === soundText) {

            break;
        }
    }
    
    if (!foundKey || !AUDIO_FILES[foundKey]) {
        console.warn('Нет аудио для:', soundText);
        if (callback) callback();
        return;
    }
    
    const audio = new Audio(AUDIO_FILES[foundKey]);
    audio.onended = callback;
    audio.onerror = callback;
